<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Personagens da Disney</title>
</head>

<style>
  @import url('https://fonts.cdnfonts.com/css/all-disney');
</style>

<body>
  <header>
    

    <div class="header-content">
      <img src="disneyCastle.png" alt="Logo Disney">
      <h1>Personagens da Disney</h1>
    </div>

  </header>

  <div class="search">
    <input type="text" id="searchInput" placeholder="Buscar personagem...">
    <button onclick="buscar()">Buscar</button>
  </div>

  <div class="container" id="container"></div>

  <script>
    const container = document.getElementById("container");

    async function carregarPersonagens(nome = "") {
      container.innerHTML = "<p class='loading'>Carregando...</p>";

      try {
        let url = "https://api.disneyapi.dev/character";

        if (nome) {
          url += "?name=" + nome;
        }

        const res = await fetch(url);
        const data = await res.json();

        const personagens = data.data;

        container.innerHTML = "";

        personagens.forEach(p => {
          const card = document.createElement("div");
          card.classList.add("card");

          card.innerHTML = `
            <img src="${p.imageUrl || 'https://via.placeholder.com/300'}">
            <h2>${p.name}</h2>
            <p class="info"><strong>Filmes:</strong> ${p.films?.join(", ") || "N/A"}</p>
            <p class="info"><strong>Séries:</strong> ${p.tvShows?.join(", ") || "N/A"}</p>
          `;

          container.appendChild(card);
        });

      } catch (erro) {
        container.innerHTML = "<p class='loading'>Erro ao carregar dados 😢</p>";
        console.error(erro);
      }
    }

    function buscar() {
      const nome = document.getElementById("searchInput").value;
      carregarPersonagens(nome);
    }

    // Carregamento inicial
    carregarPersonagens();
  </script>

</body>

</html>
